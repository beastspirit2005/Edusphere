<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>EduSphere AI Tutor</title>

<link rel="stylesheet" href="css/student.css">
<link rel="stylesheet" href="css/aiChat.css">

</head>

<body>

<div class="ai-layout">

    <!-- SIDEBAR -->
    <div class="ai-sidebar">

        <h3>EduSphere AI</h3>

        <button onclick="goBack()">⬅ Back</button>

        <button onclick="clearChat()">🧹 Clear Chat</button>

        <hr>

        <h4>Quick Tools</h4>

        <button onclick="quickPrompt('Explain this topic simply')">
        📘 Explain Topic
        </button>

        <button onclick="quickPrompt('Create quiz questions from this topic')">
        🧠 Generate Quiz
        </button>

        <button onclick="quickPrompt('Summarize this material')">
        ✂ Summarize
        </button>

        <button onclick="quickPrompt('Give step-by-step solution')">
        🧮 Solve Problem
        </button>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-main">

        <div class="chat-header">
            <h2>🤖 EduSphere AI</h2>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="upload-area">
           <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.txt,.docx,.doc">
        </div>

        <div class="chat-input">

            <input
            type="text"
            id="userMessage"
            placeholder="Ask anything about your subjects..."
            >

            <button onclick="sendMessage()">Send</button>

        </div>

    </div>

</div>

<script src="aiChat.js"></script>

</body>
</html>
